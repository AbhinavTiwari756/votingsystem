<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – SecureVote</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #020617;
            color: white;
        }

        /* ------------ NAVBAR ------------ */
        nav {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 26px;
            font-weight: 700;
            color: #00e5ff;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav ul li a {
            text-decoration: none;
            color: #cbd5e1;
            transition: 0.3s;
            font-weight: 500;
        }

        nav ul li a:hover {
            color: #00e5ff;
        }

        /* HAMBURGER */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #00e5ff;
        }

        /* MOBILE MENU */
        #mobileMenu {
            display: none;
            flex-direction: column;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 15px 0;
            position: fixed;
            top: 75px;
            z-index: 900;
            text-align: center;
        }

        #mobileMenu a {
            padding: 12px 0;
            font-size: 18px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        #mobileMenu a:hover {
            color: #00e5ff;
        }

        /* ------------ SIGNUP CARD ------------ */
        .container {
            max-width: 420px;
            margin: 150px auto 60px;
            padding: 30px;

            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            border: 1px solid rgba(0,229,255,0.4);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0,229,255,0.2);

            text-align: center;
        }

        h2 {
            font-size: 28px;
            color: #00e5ff;
            margin-bottom: 25px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin: 10px 0 18px;
            border-radius: 10px;
            border: 1px solid rgba(0,229,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px #00e5ff;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 17px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #00e5ff;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #03c4db;
            transform: translateY(-3px);
            box-shadow: 0 0 15px #00e5ff;
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }

        .link a {
            color: #00e5ff;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* ------------ FOOTER ------------ */
        footer {
            text-align: center;
            padding: 20px;
            background: #0c1324;
            color: #64748b;
            margin-top: 40px;
        }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            nav ul { display: none; }
            .hamburger { display: flex; }
        }
    </style>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("mobileMenu");
            menu.style.display = menu.style.display === "flex" ? "none" : "flex";
        }
    </script>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">🔐 SecureVote</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Security</a></li>
            <li><a href="#">Help</a></li>
        </ul>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="#">Security</a>
        <a href="#">Help</a>
    </div>


    <!-- SIGNUP FORM -->
    <div class="container">
        <h2>Create Account</h2>

        <form id="signupForm">
            <input type="text" id="name" placeholder="Full Name" required />
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required />

            <button type="submit">Sign Up</button>
        </form>

        <div class="link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2025 SecureVote | All Rights Reserved
    </footer>


<script>
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const user = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value.trim(),
    };

    let response = await fetch("/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
    });

    let data = await response.json();
    alert(data.message);

    if (data.success) {
        window.location.href = "login.html";
    }
});
</script>

</body>
</html>
