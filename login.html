<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SecureVote</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #020617;
      color: white;
    }

    /* ------------ NAVBAR ------------ */
    nav {
      width: 100%;
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      z-index: 1000;
    }

    nav .logo {
      font-size: 26px;
      font-weight: 700;
      color: #00e5ff;
    }

    nav ul {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    nav ul li a {
      color: #cbd5e1;
      font-weight: 500;
      text-decoration: none;
      transition: 0.3s;
    }

    nav ul li a:hover {
      color: #00e5ff;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .hamburger span {
      width: 28px;
      height: 3px;
      background: #00e5ff;
    }

    /* MOBILE MENU */
    #mobileMenu {
      display: none;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      width: 100%;
      padding: 15px 0;
      position: fixed;
      top: 75px;
      z-index: 900;
      text-align: center;
    }

    #mobileMenu a {
      padding: 12px 0;
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }

    #mobileMenu a:hover {
      color: #00e5ff;
    }

    /* ------------ LOGIN CARD ------------ */
    .container {
      max-width: 420px;
      margin: 150px auto 80px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      border: 1px solid rgba(0, 229, 255, 0.4);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
      text-align: center;
    }

    h2 {
      color: #00e5ff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0 18px 0;
      border-radius: 10px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 10px #00e5ff;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 50px;
      background: #00e5ff;
      color: #000;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #04c6d8;
      transform: translateY(-3px);
      box-shadow: 0 0 15px #00e5ff;
    }

    .alt-buttons button {
      margin-top: 12px;
      background: #038ea0;
    }

    .alt-buttons button:hover {
      background: #04c6d8;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }

    .link a {
      color: #00e5ff;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

    /* ------------ FOOTER ------------ */
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #0c1324;
      color: #64748b;
    }

    /* RESPONSIVE */
    @media (max-width: 850px) {
      nav ul { display: none; }
      .hamburger { display: flex; }
    }
  </style>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("mobileMenu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }
  </script>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🔐 SecureVote</div>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">Security</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <div class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="#">Features</a>
    <a href="#">Security</a>
    <a href="#">Contact</a>
  </div>

  <!-- LOGIN CARD -->
  <div class="container">
    <h2>Login</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />

      <button type="submit">Login</button>
    </form>

    <div class="alt-buttons">
      <button onclick="window.location.href='otp-login.html'">Login with OTP</button>
      <button onclick="window.location.href='face-login.html'">Login with Face</button>
    </div>

    <div class="link">
      New user? <a href="signup.html">Create account</a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2025 SecureVote | All Rights Reserved
  </footer>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  let user = {
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value.trim(),
  };

  let response = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(user)
  });

  let data = await response.json();
  alert(data.message);

  if (data.success) {
    window.location.href = "dashboard.html";
  }
});
</script>

</body>
</html>
