<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face + OTP Authentication</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #020617;
      color: white;
    }

    /* ------------ NAVBAR ------------ */
    nav {
      width: 100%;
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      z-index: 1000;
    }

    nav .logo {
      font-size: 26px;
      font-weight: 700;
      color: #00e5ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 40px;
    }

    nav ul li a {
      text-decoration: none;
      color: #cbd5e1;
      transition: 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      color: #00e5ff;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .hamburger span {
      width: 28px;
      height: 3px;
      background: #00e5ff;
      transition: 0.3s;
    }

    /* MOBILE MENU */
    #mobileMenu {
      display: none;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      width: 100%;
      padding: 15px 0;
      text-align: center;
      position: fixed;
      top: 75px;
      z-index: 999;
    }

    #mobileMenu a {
      padding: 12px 0;
      display: block;
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    #mobileMenu a:hover {
      color: #00e5ff;
    }

    /* ------------ MAIN CARD ------------ */
    .container {
      max-width: 450px;
      margin: 150px auto 80px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      border: 1px solid rgba(0, 229, 255, 0.4);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
      text-align: center;
    }

    h2 {
      color: #00e5ff;
      font-size: 28px;
      margin-bottom: 25px;
      font-weight: 700;
    }

    .auth-btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 17px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: #00e5ff;
      color: #000;
      font-weight: 700;
      transition: 0.3s;
    }

    .auth-btn:hover {
      background: #04c6d8;
      transform: translateY(-3px);
      box-shadow: 0 0 15px #00e5ff;
    }

    /* BACK LINK */
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #94a3b8;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-link:hover {
      color: #00e5ff;
    }

    /* ------------ FOOTER ------------ */
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #0c1324;
      color: #64748b;
      font-size: 14px;
    }

    /* ------------ RESPONSIVE ------------ */
    @media (max-width: 850px) {
      nav ul {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("mobileMenu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }
  </script>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🔐 SecureVote</div>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">Security</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <div class="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="#">Features</a>
    <a href="#">Security</a>
    <a href="#">Contact</a>
  </div>

  <!-- MAIN AUTH BOX -->
  <div class="container">
    <h2>Face + OTP Authentication</h2>

    <button class="auth-btn" onclick="location.href='signup.html'">Sign Up</button>

    <button class="auth-btn" onclick="location.href='login.html'">Login</button>

    <button class="auth-btn" onclick="location.href='face-register.html'">Register Face</button>

    <button class="auth-btn" onclick="location.href='face-login.html'">Login With Face</button>

    <button class="auth-btn" onclick="location.href='otp-login.html'">Login With OTP</button>

    <a href="home.html" class="back-link">← Back to Home</a>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2025 SecureVote | All Rights Reserved | Made by <br>
    Abhinav Tiwari | Abhay Singh | Alok Bhaskar | Anoop Pal | Rohan Srivastava
  </footer>

</body>
</html>
