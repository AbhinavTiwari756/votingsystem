<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Login – SecureVote</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #020617;
            color: white;
        }

        /* ------------ NAVBAR ------------ */
        nav {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 26px;
            font-weight: 700;
            color: #00e5ff;
        }

        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        nav ul li a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00e5ff;
        }

        /* HAMBURGER */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #00e5ff;
        }

        /* MOBILE MENU */
        #mobileMenu {
            display: none;
            flex-direction: column;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 15px 0;
            position: fixed;
            top: 75px;
            z-index: 900;
            text-align: center;
        }

        #mobileMenu a {
            padding: 12px 0;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        #mobileMenu a:hover {
            color: #00e5ff;
        }

        /* ------------ CAMERA BOX ------------ */
        .container {
            max-width: 480px;
            margin: 150px auto 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(0,229,255,0.4);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(0,229,255,0.2);
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #00e5ff;
        }

        p {
            color: #94a3b8;
            margin-bottom: 15px;
        }

        video, canvas {
            width: 100%;
            border-radius: 14px;
            margin-top: 10px;
            border: 1px solid rgba(0,229,255,0.3);
        }

        /* ------------ BUTTON ------------ */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            margin-top: 20px;
            border-radius: 50px;
            cursor: pointer;
            background: #00e5ff;
            font-size: 17px;
            font-weight: bold;
            color: black;
            transition: 0.3s;
        }

        button:hover {
            background: #03c4db;
            box-shadow: 0 0 15px #00e5ff;
            transform: translateY(-3px);
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #38bdf8;
            font-size: 16px;
            font-weight: bold;
        }

        /* ------------ FOOTER ------------ */
        footer {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            background: #0c1324;
            color: #64748b;
        }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            nav ul { display: none; }
            .hamburger { display: flex; }
        }
    </style>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("mobileMenu");
            menu.style.display = menu.style.display === "flex" ? "none" : "flex";
        }
    </script>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">🔐 SecureVote</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Security</a></li>
            <li><a href="#">Help</a></li>
        </ul>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="#">Security</a>
        <a href="#">Help</a>
    </div>


    <!-- FACE LOGIN BOX -->
    <div class="container">
        <h2>Face Login</h2>
        <p>Please look straight into the camera</p>

        <video id="camera" autoplay></video>

        <button onclick="loginWithFace()">Verify Face</button>

        <div class="loading" id="loading">Verifying...</div>

        <canvas id="snapshot" style="display:none;"></canvas>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2025 SecureVote | All Rights Reserved
    </footer>


<script>
const video = document.getElementById("camera");
const canvas = document.getElementById("snapshot");
const context = canvas.getContext("2d");
const loading = document.getElementById("loading");

// Turn on camera
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    } catch (error) {
        alert("Camera access blocked!");
    }
}

startCamera();

// Capture face and send to backend
async function loginWithFace() {
    loading.style.display = "block";

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0);

    const faceImage = canvas.toDataURL("image/png");

    let response = await fetch("/api/face-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ faceImage })
    });

    let data = await response.json();
    loading.style.display = "none";

    if (data.success) {
        alert("Login Successful!");
        window.location.href = "dashboard.html";
    } else {
        alert(data.message || "Face not matched. Try again.");
    }
}
</script>

</body>
</html>
