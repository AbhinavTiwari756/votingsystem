<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Registration – SecureVote</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #020617;
            color: white;
        }

        /* ------------ NAVBAR ------------ */
        nav {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 26px;
            font-weight: 700;
            color: #00e5ff;
        }

        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        nav ul li a {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00e5ff;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #00e5ff;
        }

        /* MOBILE DROPDOWN */
        #mobileMenu {
            display: none;
            flex-direction: column;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 15px 0;
            position: fixed;
            top: 75px;
            z-index: 900;
            text-align: center;
        }

        #mobileMenu a {
            padding: 12px 0;
            display: block;
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        #mobileMenu a:hover {
            color: #00e5ff;
        }

        /* ------------ FACE REGISTRATION CARD ------------ */
        .container {
            max-width: 480px;
            margin: 150px auto 50px;
            padding: 30px;
            text-align: center;

            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,229,255,0.4);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0,229,255,0.2);
        }

        h2 {
            font-size: 28px;
            color: #00e5ff;
            font-weight: 700;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid rgba(0,229,255,0.3);
            background: rgba(255,255,255,0.1);
            font-size: 16px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px #00e5ff;
        }

        video, canvas {
            width: 100%;
            border-radius: 14px;
            margin-top: 15px;
            border: 1px solid rgba(0,229,255,0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            font-size: 17px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: #00e5ff;
            color: black;
            font-weight: 700;
            transition: 0.3s;
        }

        button:hover {
            background: #03c4db;
            box-shadow: 0 0 15px #00e5ff;
            transform: translateY(-3px);
        }

        /* ------------ FOOTER ------------ */
        footer {
            text-align: center;
            padding: 20px;
            background: #0c1324;
            color: #64748b;
            margin-top: 40px;
        }

        /* ------------ RESPONSIVE ------------ */
        @media (max-width: 850px) {
            nav ul { display: none; }
            .hamburger { display: flex; }
        }
    </style>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("mobileMenu");
            menu.style.display = menu.style.display === "flex" ? "none" : "flex";
        }
    </script>

</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">🔐 SecureVote</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Help</a></li>
        </ul>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="#">Features</a>
        <a href="#">Help</a>
    </div>


    <!-- FACE REGISTRATION FORM -->
    <div class="container">
        <h2>Register Your Face</h2>

        <input type="email" id="email" placeholder="Enter Email" required />

        <video id="camera" autoplay></video>

        <button onclick="captureFace()">Capture & Save Face</button>

        <canvas id="snapshot" style="display:none;"></canvas>
    </div>


    <!-- FOOTER -->
    <footer>
        © 2025 SecureVote | All Rights Reserved
    </footer>


<script>
    const video = document.getElementById("camera");
    const canvas = document.getElementById("snapshot");
    const context = canvas.getContext("2d");

    // Start Camera
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch (error) {
            alert("Camera access blocked!");
        }
    }

    startCamera();

    // Capture Face
    async function captureFace() {
        const email = document.getElementById("email").value.trim();
        if (!email) return alert("Enter your email first!");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);

        const faceImage = canvas.toDataURL("image/png");

        let response = await fetch("/api/face-register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, faceImage })
        });

        let data = await response.json();
        alert(data.message);

        if (data.success) {
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>
